name: Ping Backend

on:
  push:
    branches:
      - main
  schedule:
    # Execute toutes les 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch:
  # Permet execution manuelle

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping TaTrend Backend
        run: |
          url="https://ecommercebackend-h1hz.onrender.com/up"
          max_attempts=5
          sleep_between_attempts=15

          for attempt in $(seq 1 "$max_attempts"); do
            echo "Tentative $attempt/$max_attempts vers $url"

            response=$(curl -sS -L --max-time 30 -o /dev/null -w "%{http_code}" "$url" || true)
            response=${response:-000}

            echo "HTTP Status: $response"

            if [ "$response" = "200" ]; then
              echo "Backend actif!"
              exit 0
            fi

            if [ "$attempt" -lt "$max_attempts" ]; then
              echo "Backend indisponible ou en reveil, nouvelle tentative dans ${sleep_between_attempts}s..."
              sleep "$sleep_between_attempts"
            fi
          done

          echo "Le backend n'a pas repondu correctement apres $max_attempts tentatives."
          exit 1
